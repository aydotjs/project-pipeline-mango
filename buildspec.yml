version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - npm install

  pre_build:
    commands:
      - echo "Fetching parameters for $ENVIRONMENT environment from SSM..."
      - export NODE_ENV=$(aws ssm get-parameter --name /sour-mango/$ENVIRONMENT/node-env --query 'Parameter.Value' --output text)
      - export APP_NAME=$(aws ssm get-parameter --name /sour-mango/$ENVIRONMENT/app-name --query 'Parameter.Value' --output text)
      - export PORT=$(aws ssm get-parameter --name /sour-mango/$ENVIRONMENT/port --query 'Parameter.Value' --output text)
      - echo "================================================"
      - echo "Building for Environment - $ENVIRONMENT"
      - echo "Node Environment - $NODE_ENV"
      - echo "App Name - $APP_NAME"
      - echo "Port - $PORT"
      - echo "================================================"
      - echo "Getting current Lambda live alias version..."
      - CURRENT_VERSION=$(aws lambda get-alias --function-name payment-processor --name live --query 'FunctionVersion' --output text)
      - echo "Current live version is $CURRENT_VERSION"

  build:
    commands:
      - echo "Creating .env file..."
      - echo "NODE_ENV=$NODE_ENV" > .env
      - echo "APP_NAME=$APP_NAME" >> .env
      - echo "PORT=$PORT" >> .env
      - cat .env
      - echo "Packaging Lambda zip..."
      - zip -j lambda.zip lambda_function.py
      - echo "Running unit tests..."
      - npm test -- --coverage

  post_build:
    commands:
      - echo "Running smoke tests..."
      - npm run test:smoke
      - echo "Uploading new Lambda code..."
      - aws lambda update-function-code --function-name payment-processor --zip-file fileb://lambda.zip
      - aws lambda wait function-updated --function-name payment-processor
      - echo "Publishing new Lambda version..."
      - NEW_VERSION=$(aws lambda publish-version --function-name payment-processor --query 'Version' --output text)
      - echo "New version published - $NEW_VERSION"

      # Build the SINGLE artifact folder with everything inside
      - echo "Building combined artifact..."
      - mkdir -p artifact/ec2
      - mkdir -p artifact/lambda

      # Copy EC2 app files into artifact/ec2/
      - cp .env artifact/ec2/
      - cp package.json artifact/ec2/
      - cp package-lock.json artifact/ec2/
      - cp server.js artifact/ec2/
      - cp smoke-test.js artifact/ec2/
      - cp index.html artifact/ec2/ 2>/dev/null || true
      - cp -r public artifact/ec2/ 2>/dev/null || true
      - cp -r scripts artifact/ec2/

      # Write EC2 appspec into artifact/ec2/
      - |
        cat > artifact/ec2/appspec.yml << 'EOF'
        version: 0.0
        os: linux
        files:
          - source: /
            destination: /home/ec2-user/sour-mango
        hooks:
          BeforeInstall:
            - location: scripts/stop_server.sh
              timeout: 60
              runas: root
          AfterInstall:
            - location: scripts/install_dependencies.sh
              timeout: 120
              runas: root
          ApplicationStart:
            - location: scripts/start_server.sh
              timeout: 60
              runas: root
          ValidateService:
            - location: scripts/validate_service.sh
              timeout: 30
              runas: root
        EOF

      # Copy Lambda zip into artifact/lambda/
      - cp lambda.zip artifact/lambda/

      # Write Lambda appspec into artifact/lambda/
      - |
        cat > artifact/lambda/appspec.yml << EOF
        version: 0.0
        Resources:
          - myLambdaFunction:
              Type: AWS::Lambda::Function
              Properties:
                Name: "payment-processor"
                Alias: "live"
                CurrentVersion: "$CURRENT_VERSION"
                TargetVersion: "$NEW_VERSION"
        EOF
      - echo "Lambda appspec.yml written:"
      - cat artifact/lambda/appspec.yml
      - echo "Build complete for $APP_NAME ($ENVIRONMENT)!"

# ONE artifact containing both ec2/ and lambda/ folders
artifacts:
  base-directory: artifact
  files:
    - '**/*'
  name: BuildArtifact

cache:
  paths:
    - 'node_modules/**/*'
