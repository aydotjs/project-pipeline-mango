version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - npm install

  pre_build:
    commands:
      - echo "Fetching parameters for $ENVIRONMENT environment from SSM..."
      - export NODE_ENV=$(aws ssm get-parameter --name /sour-mango/$ENVIRONMENT/node-env --query 'Parameter.Value' --output text)
      - export APP_NAME=$(aws ssm get-parameter --name /sour-mango/$ENVIRONMENT/app-name --query 'Parameter.Value' --output text)
      - export PORT=$(aws ssm get-parameter --name /sour-mango/$ENVIRONMENT/port --query 'Parameter.Value' --output text)
      - echo "================================================"
      - echo "Building for Environment - $ENVIRONMENT"
      - echo "Node Environment - $NODE_ENV"
      - echo "App Name - $APP_NAME"
      - echo "Port - $PORT"
      - echo "================================================"
      - echo "Getting current Lambda live alias version..."
      - CURRENT_VERSION=$(aws lambda get-alias --function-name payment-processor --name live --query 'FunctionVersion' --output text)
      - echo "Current live version is $CURRENT_VERSION"

  build:
    commands:
      - echo "Creating .env file..."
      - echo "NODE_ENV=$NODE_ENV" > .env
      - echo "APP_NAME=$APP_NAME" >> .env
      - echo "PORT=$PORT" >> .env
      - cat .env
      - echo "Packaging Lambda zip..."
      - zip -j lambda.zip lambda_function.py
      - echo "Running unit tests..."
      - npm test -- --coverage

  post_build:
    commands:
      - echo "Running smoke tests..."
      - npm run test:smoke
      - echo "Uploading new Lambda code..."
      - aws lambda update-function-code --function-name payment-processor --zip-file fileb://lambda.zip
      - aws lambda wait function-updated --function-name payment-processor
      - echo "Publishing new Lambda version..."
      - NEW_VERSION=$(aws lambda publish-version --function-name payment-processor --query 'Version' --output text)
      - echo "New version published - $NEW_VERSION"

      - echo "Building EC2 artifact..."
      - mkdir -p ec2-artifact
      - cp .env ec2-artifact/
      - cp package.json ec2-artifact/
      - cp package-lock.json ec2-artifact/
      - cp server.js ec2-artifact/
      - cp smoke-test.js ec2-artifact/
      - cp index.html ec2-artifact/ 2>/dev/null || true
      - cp -r public ec2-artifact/ 2>/dev/null || true
      - cp -r scripts ec2-artifact/
      - printf 'version: 0.0\nos: linux\nfiles:\n  - source: /\n    destination: /home/ec2-user/sour-mango\nhooks:\n  BeforeInstall:\n    - location: scripts/stop_server.sh\n      timeout: 60\n      runas: root\n  AfterInstall:\n    - location: scripts/install_dependencies.sh\n      timeout: 120\n      runas: root\n  ApplicationStart:\n    - location: scripts/start_server.sh\n      timeout: 60\n      runas: root\n  ValidateService:\n    - location: scripts/validate_service.sh\n      timeout: 30\n      runas: root\n' > ec2-artifact/appspec.yml
      - echo "EC2 appspec.yml written:"
      - cat ec2-artifact/appspec.yml

      - echo "Building Lambda artifact..."
      - mkdir -p lambda-artifact
      - cp lambda.zip lambda-artifact/
      - printf 'version: 0.0\nResources:\n  - myLambdaFunction:\n      Type: AWS::Lambda::Function\n      Properties:\n        Name: "payment-processor"\n        Alias: "live"\n        CurrentVersion: "%s"\n        TargetVersion: "%s"\n' "$CURRENT_VERSION" "$NEW_VERSION" > lambda-artifact/appspec.yml
      - echo "Lambda appspec.yml written:"
      - cat lambda-artifact/appspec.yml
      - echo "Build complete for $APP_NAME ($ENVIRONMENT)!"

artifacts:
  secondary-artifacts:
    BuildArtifact:
      base-directory: ec2-artifact
      files:
        - '**/*'
    lambda-artifact:
      base-directory: lambda-artifact
      files:
        - appspec.yml
        - lambda.zip

cache:
  paths:
    - 'node_modules/**/*'
