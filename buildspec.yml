version: 0.2
phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - npm install
  pre_build:
    commands:
      - echo "Fetching parameters for $ENVIRONMENT environment from SSM..."
      - export NODE_ENV=$(aws ssm get-parameter --name /sour-mango/$ENVIRONMENT/node-env --query 'Parameter.Value' --output text)
      - export APP_NAME=$(aws ssm get-parameter --name /sour-mango/$ENVIRONMENT/app-name --query 'Parameter.Value' --output text)
      - export PORT=$(aws ssm get-parameter --name /sour-mango/$ENVIRONMENT/port --query 'Parameter.Value' --output text)
      - echo "================================================"
      - echo "Building for Environment - $ENVIRONMENT"
      - echo "Node Environment - $NODE_ENV"
      - echo "App Name - $APP_NAME"
      - echo "Port - $PORT"
      - echo "================================================"
      - echo "Getting current Lambda version..."
      - CURRENT_VERSION=$(aws lambda get-alias --function-name payment-processor --name live --query 'FunctionVersion' --output text)
      - echo "Current live version is $CURRENT_VERSION"
  build:
    commands:
      - echo "Creating .env file with environment-specific variables..."
      - echo "NODE_ENV=$NODE_ENV" > .env
      - echo "APP_NAME=$APP_NAME" >> .env
      - echo "PORT=$PORT" >> .env
      - echo ".env file created successfully!"
      - cat .env
      - echo "Packaging Lambda function..."
      - zip -j lambda.zip lambda_function.py
      - echo "Running unit tests with coverage..."
      - npm test -- --coverage
  post_build:
    commands:
      - echo "Running smoke tests..."
      - npm run test:smoke
      - echo "Updating Lambda function code..."
      - aws lambda update-function-code --function-name payment-processor --zip-file fileb://lambda.zip
      - aws lambda wait function-updated --function-name payment-processor
      - echo "Publishing new Lambda version..."
      - NEW_VERSION=$(aws lambda publish-version --function-name payment-processor --query 'Version' --output text)
      - echo "New version published - $NEW_VERSION"
      - echo "Writing dynamic appspec-lambda.yml..."
      - |
        cat > appspec-lambda.yml << EOF
        version: 0.0
        Resources:
          - myLambdaFunction:
              Type: AWS::Lambda::Function
              Properties:
                Name: "payment-processor"
                Alias: "live"
                CurrentVersion: "$CURRENT_VERSION"
                TargetVersion: "$NEW_VERSION"
        EOF
      - echo "appspec-lambda.yml written successfully"
      - cat appspec-lambda.yml
      - echo "Build completed successfully for $APP_NAME ($ENVIRONMENT)!"
artifacts:
  files:
    - appspec.yml
    - appspec-lambda.yml
    - appspec-ecs.yml
    - .env
    - package.json
    - package-lock.json
    - 'public/**/*'
    - 'scripts/**/*'
    - server.js
    - smoke-test.js
    - app.test.js
    - index.html
    - lambda.zip
  name: sour-mango-$ENVIRONMENT-artifact
  exclude-paths:
    - node_modules/**/*
    - coverage/**/*
    - __tests__/**/*
    - .git/**/*
    - .gitignore
    - buildspec.yml
    - sour-mango-v1.zip
cache:
  paths:
    - 'node_modules/**/*'
